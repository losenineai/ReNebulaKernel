name: 构建 ReSukiSU

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      is_vki:
        description: "是否为 VKI（vivo 源码替换 common）"
        type: boolean
        default: false
      vivo_tarball_url:
        description: "VKI 时 tarball 直链（在线拉取）"
        type: string
        default: "https://opensource.vivo.com/oss/uploader/download?token=eyJhbGciOiJIUzUxMiJ9.eyJeeXEwTkxpTllTeXlYTFZYREVUVDYwcDJaJUNaS3d3ViI6ImhjZXpiOCIsInN1YiI6Ijc0ODc3ODA3OTc2NDU5NTkyIiwiZXhwIjoxNzczMTI4NDg0LCJpYXQiOjE3NzMxMjc4ODR9.5dfhJf74xoNDu4TVhCw5QVdEEjvBBES3XBJKezwI1UXR2cM5yokEfzoe5ntCS7I_WvUAoPeqoKxVmI-z6M5ZeA&appNamevos"
      android_version:
        type: string
        default: "android14"
      kernel_version:
        type: string
        default: "6.1"
      sub_level:
        type: string
        default: "145"
      os_patch_level:
        type: string
        default: "2025-09"
      version:
        description: "内核版本后缀（空则 NebulaML_XingChen-resukisu）"
        type: string
        default: "NebulaML_XingChen-resukisu"
      use_bbr:
        type: boolean
        default: true
      use_bbg:
        type: boolean
        default: false
      embed_zram:
        type: boolean
        default: true
      zram_more_algos:
        type: boolean
        default: true
      enable_susfs:
        type: boolean
        default: true
      enable_kpm:
        type: boolean
        default: true

jobs:
  build:
    uses: ./.github/workflows/_build-kernel.yml
    secrets: inherit
    with:
      branch: resukisu
      is_vki: ${{ inputs.is_vki }}
      vivo_tarball_url: ${{ inputs.vivo_tarball_url }}
      android_version: ${{ inputs.android_version }}
      kernel_version: ${{ inputs.kernel_version }}
      sub_level: ${{ inputs.sub_level }}
      os_patch_level: ${{ inputs.os_patch_level }}
      version: ${{ inputs.version }}
      use_bbr: ${{ inputs.use_bbr }}
      use_bbg: ${{ inputs.use_bbg }}
      embed_zram: ${{ inputs.embed_zram }}
      zram_more_algos: ${{ inputs.zram_more_algos }}
      enable_susfs: ${{ inputs.enable_susfs }}
      enable_kpm: ${{ inputs.enable_kpm }}
